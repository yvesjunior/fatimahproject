services:

  fatimaproject_web:
    container_name: fatimaproject
    build:
      context: .
      dockerfile: ./infra/web/Dockerfile.prod
    ports:
      - "${WEB_PORT}:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - storage_data:/var/www/html/storage/app
    restart: always

volumes:
  storage_data:
