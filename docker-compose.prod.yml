services:

  fatimaproject_web:
    container_name: fatimaproject_prod
    image: fatimaproject:prod
    ports:
      - "${WEB_PORT}:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - TRUSTED_PROXIES=*
      - FORCE_HTTPS=true
      - SESSION_SECURE_COOKIE=true
      - SESSION_DOMAIN=${SESSION_DOMAIN}
      - DB_CONNECTION=mysql
      - DB_HOST=fatimaproject_db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${APP_SOURCE_PATH}/src/web/data:/var/www/html
      - fatimaproject_storage:/var/www/html/storage/app/public
    depends_on:
      fatimaproject_db:
        condition: service_healthy
    restart: always

  fatimaproject_db:
    image: mysql:5.7
    container_name: fatimaproject_db
    volumes:
      - fatimaproject_dbdata:/var/lib/mysql
      - ./fatimaproject_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: always

volumes:
  fatimaproject_dbdata:
  fatimaproject_storage:
